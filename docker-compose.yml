services:
  db:
    image: postgres:16
    container_name: wcp_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wcp_backend
    env_file: .env
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }

  frontend:
    build: ./frontend
    container_name: wcp_frontend
    ports: ["5173:5173"]
    depends_on: [backend]

