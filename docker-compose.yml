services:
  db:
    image: postgres:16
    container_name: wcp_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wcp_backend
    env_file: .env
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules   # préserve les node_modules du build

  frontend:
    build: ./frontend
    container_name: wcp_frontend
    ports: ["5173:5173"]
    depends_on: [backend]
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    volumes:
      - ./frontend:/app
      - /app/node_modules   # préserve les node_modules du build

  # Scraper FBref — lancé manuellement : docker compose run --rm scraper
  scraper:
    build: ./scraper
    container_name: wcp_scraper
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
    profiles: ["tools"]

  # Modèle Poisson — lancé manuellement : docker compose run --rm ai-service
  ai-service:
    build: ./ai-service
    container_name: wcp_ai
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
    profiles: ["tools"]

volumes:
  pgdata: